name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Verify Icon Files
      run: |
        echo "=== Verifying icon files ==="
        ls -la app/src/main/res/mipmap-*/ic_launcher.png
        echo "=== Checking icon file headers ==="
        for f in app/src/main/res/mipmap-*/ic_launcher.png; do
          echo "File: $f"
          file "$f" | head -1
          head -c 100 "$f" | xxd | head -3
        done
        
    - name: Setup Gradle Wrapper
      run: |
        echo "=== Setting up Gradle Wrapper ==="
        mkdir -p gradle/wrapper
        
        # 创建 gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # 下载 wrapper jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
        
        # 创建正确的 gradlew 脚本
        cat > gradlew << 'SCRIPT'
        #!/bin/sh
        APP_HOME=$(cd "$(dirname "$0")" && pwd)
        java -Xmx2048m -Xms512m -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
        SCRIPT
        
        chmod +x gradlew
        
        echo "=== Gradle Wrapper Setup Complete ==="

    - name: Build Debug APK
      run: |
        ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "Build exit code: $BUILD_EXIT_CODE"
        exit $BUILD_EXIT_CODE
        
    - name: Sign Debug APK
      run: |
        echo "=== Generating debug keystore ==="
        # 生成调试密钥库（如果还没有）
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        
        echo "=== Signing APK with debug key ==="
        cd app/build/outputs/apk/debug/
        
        # 找到未签名的 APK
        for apk in *.apk; do
          if [ -f "$apk" ]; then
            echo "Signing: $apk"
            # 使用 apksigner 签名
            ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --in "$apk" --out "signed-$apk"
            if [ -f "signed-$apk" ]; then
              mv "signed-$apk" "$apk"
              echo "Signed: $apk"
            fi
          fi
        done
        
        cd -
        echo "=== APK signing complete ==="
        
    - name: Verify APK Signature
      run: |
        echo "=== APK files ==="
        ls -la app/build/outputs/apk/debug/
        
        echo "=== Checking APK signature ==="
        for apk in app/build/outputs/apk/debug/*.apk; do
          echo "Checking: $apk"
          unzip -l "$apk" | grep -E "(META-INF|\.RSA|\.SF|\.MF)" || echo "No signature files found"
        done
        
    - name: Show build results
      run: |
        echo "=== BUILD LOG (last 100 lines) ==="
        tail -100 build.log
        echo "=== END LOG ==="
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "=== APK directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: zhenci-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
