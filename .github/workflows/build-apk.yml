name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        echo "Exit code: $?"
      
    - name: Check build output
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== All files ==="
        ls -la
        echo "=== App directory ==="
        ls -la app/
        echo "=== Build directory ==="
        ls -la app/build/ 2>/dev/null || echo "No build dir"
        echo "=== Outputs ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
        echo "=== APK directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
        echo "=== Debug directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
        echo "=== Find all APK ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files"
      
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zhenci-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
