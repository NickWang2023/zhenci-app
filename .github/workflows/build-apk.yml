name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Download Gradle Wrapper if missing
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading Gradle Wrapper..."
          curl -L -o gradle-wrapper.jar.tmp https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          mv gradle-wrapper.jar.tmp gradle/wrapper/gradle-wrapper.jar
        fi
        ls -la gradle/wrapper/
      
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace || echo "Build failed, checking logs..."
        echo "Build directory structure:"
        find app/build -type d 2>/dev/null | head -20 || echo "No build directory"
        echo "Looking for APK files:"
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
      
    - name: Check and Upload Debug APK
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "Debug APK found"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "Debug APK not found, checking alternative locations..."
          find app/build -name "*.apk" -type f 2>/dev/null
        fi
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --stacktrace || echo "Build failed, checking logs..."
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
