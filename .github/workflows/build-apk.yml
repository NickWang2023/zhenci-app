name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build with Gradle Wrapper
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew clean
        ./gradlew assembleDebug --info --stacktrace 2>&1 | tee build.log
      
    - name: Check build output
      run: |
        echo "=== Build log ==="
        cat build.log | tail -100
        echo "=== Looking for APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Build directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No APK directory"
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          build.log
        if-no-files-found: warn
