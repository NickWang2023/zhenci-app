name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        
    - name: Build Debug APK
      run: |
        gradle :app:assembleDebug --stacktrace --info 2>&1 | tee build.log
        echo "Build exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
        
    - name: Show build log
      run: |
        echo "=== BUILD LOG ==="
        cat build.log
        echo "=== END LOG ==="
        
    - name: Check APK
      run: |
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"
        find . -name "*.apk" 2>/dev/null || echo "No APK files"
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
      with:
        name: zhenci-apk
        path: app/build/outputs/apk/debug/app-debug.apk
