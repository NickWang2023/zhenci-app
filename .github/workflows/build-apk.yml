name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Build Debug APK with Gradle Wrapper
      run: |
        ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        echo "Build exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
        
    - name: Show build log
      run: |
        echo "=== BUILD LOG (last 100 lines) ==="
        tail -100 build.log
        echo "=== END LOG ==="
        
    - name: Check APK files
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo "=== APK directory contents ==="
        ls -laR app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zhenci-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        if-no-files-found: ignore
        
    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-outputs
        path: app/build/
        if-no-files-found: ignore
