name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Fix Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        chmod +x gradlew
        
    - name: Build Debug APK
      run: |
        ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build.log
        echo "Exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Check build directory
      run: |
        echo "=== Build directory structure ==="
        find app/build -type d 2>/dev/null | head -20 || echo "No build directory"
        echo "=== All APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files"
      
    - name: Upload APK if exists
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
      with:
        name: zhenci-apk
        path: app/build/outputs/apk/debug/app-debug.apk
