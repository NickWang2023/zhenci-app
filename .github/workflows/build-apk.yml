name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Check Gradle version
      run: ./gradlew --version
      
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --info --stacktrace 2>&1 | tee build-output.txt
        echo "Build finished with exit code: ${PIPESTATUS[0]}"
      continue-on-error: true
      
    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: build-output.txt
        if-no-files-found: ignore
      
    - name: Check if APK exists
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK found!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "APK not found, checking build directory..."
          find app/build -type f -name "*.apk" 2>/dev/null || echo "No APK files found"
          find app/build -type d 2>/dev/null | head -20
        fi
      
    - name: Upload APK if exists
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
      with:
        name: zhenci-apk
        path: app/build/outputs/apk/debug/app-debug.apk
