name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Download Gradle Wrapper
      run: |
        ./gradlew --version || (gradle wrapper --gradle-version 8.5)
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      
    - name: List APK files
      run: |
        echo "Looking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
        ls -la app/build/ 2>/dev/null || echo "Build directory not found"
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/**/*.apk
        if-no-files-found: warn
        
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace --info
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/**/*.apk
        if-no-files-found: warn
