name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Gradle
      run: |
        echo "=== Installing Gradle ==="
        # 下载并安装 Gradle
        GRADLE_VERSION=8.5
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        export PATH="/tmp/gradle-${GRADLE_VERSION}/bin:$PATH"
        echo "/tmp/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
        gradle --version
        echo "=== Gradle Setup Complete ==="
        
    - name: Check project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== App Directory ==="
        ls -la app/
        echo "=== Source Files ==="
        find app/src -name "*.kt" | head -20
        
    - name: Build Debug APK with Gradle
      run: |
        gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "Build exit code: $BUILD_EXIT_CODE"
        exit $BUILD_EXIT_CODE
      continue-on-error: true
        
    - name: Show build log
      run: |
        echo "=== BUILD LOG (last 200 lines) ==="
        tail -200 build.log
        echo "=== END LOG ==="
        
    - name: Check all build outputs
      run: |
        echo "=== Current Directory ==="
        pwd
        echo "=== Looking for all APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== Looking for build directory ==="
        find . -type d -name "build" 2>/dev/null | head -10
        echo "=== App build directory ==="
        ls -laR app/build/ 2>/dev/null || echo "app/build not found"
      
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zhenci-debug-apk
        path: |
          **/*.apk
        if-no-files-found: ignore
        
    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-outputs
        path: app/build/
        if-no-files-found: ignore
